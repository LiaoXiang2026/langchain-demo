<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #fff; padding: 16px 20px; border-bottom: 1px solid #e0e0e0; }
        .header h1 { font-size: 18px; color: #333; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 16px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.ai { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .message.user .bubble { background: #007AFF; color: #fff; border-bottom-right-radius: 4px; }
        .message.ai .bubble { background: #fff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .input-area { background: #fff; padding: 16px 20px; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; }
        .input-area input { flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
        .input-area input:focus { border-color: #007AFF; }
        .input-area button { padding: 12px 24px; background: #007AFF; color: #fff; border: none; border-radius: 24px; font-size: 14px; cursor: pointer; }
        .input-area button:hover { background: #0056CC; }
        .input-area button:disabled { background: #ccc; cursor: not-allowed; }
        .typing { display: none; padding: 12px 16px; background: #fff; border-radius: 16px; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .typing span { display: inline-block; width: 8px; height: 8px; background: #999; border-radius: 50%; margin-right: 4px; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Agent</h1>
    </div>
    <div class="chat-container" id="chatContainer">
        <div class="message ai">
            <div class="bubble">你好！我是 AI 助手，有什么可以帮你的？</div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            appendMessage('user', message);
            userInput.value = '';
            sendBtn.disabled = true;

            showTyping();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await res.json();
                hideTyping();
                appendMessage('ai', data.reply);
            } catch (err) {
                hideTyping();
                appendMessage('ai', '请求失败，请检查网络连接。');
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.id = 'typing';
            div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }
    </script>
</body>
</html>
