[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["backend/src"]

[project]
name = "my-app-py"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
