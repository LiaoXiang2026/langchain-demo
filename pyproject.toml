dependencies = [
    "aiohttp>=3.13.5",
    "fastapi>=0.115.0",
    "langchain>=1.3.2",
    "langchain-anthropic>=1.4.3",
    "langchain-openai>=1.2.2",
    "python-dotenv>=1.2.2",
    "simpleeval>=0.9.13",
    "uvicorn>=0.34.0",
]
