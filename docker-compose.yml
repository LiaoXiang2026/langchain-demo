services:
  backend:
    build: .
    image: myapp-backend:latest
    container_name: myapp-backend
    ports:
      - "8000:8000"
    volumes:
      # 持久化整个 data/ 目录（chunks.json / embeddings.npy / documents.json / clusters.json / uploads/）
      - app-data:/app/data
    # 环境变量由 Dokploy UI 注入(不在 compose 里引用 .env 文件,避免文件缺失导致 up 失败)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 首次启动加载 sentence-transformers 模型需要时间
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # 内存限制：sentence-transformers + PyTorch + Qwen3-Embedding-0.6B 常驻约 1.5-2GB
    # 4GB VPS 上留 2GB headroom 给 OS + 其他进程
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  app-data:
