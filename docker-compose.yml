services:
  backend:
    build: .
    image: myapp-backend:latest
    container_name: myapp-backend
    ports:
      - "8000:8000"
    volumes:
      # 用户上传的原始文件(本地落盘,供人工查阅)
      - uploads:/app/data/uploads
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Chroma Cloud 模式下无需加载本地模型,启动极快
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # 内存限制：Chroma Cloud 模式下后端很轻（FastAPI + 一点 Python 运行时，~150-250MB 稳态）
    # 946MB VPS 上保留 600MB headroom 以应对流量尖峰和 Cloud 端响应延迟时的 in-flight 请求
    deploy:
      resources:
        limits:
          memory: 600M

volumes:
  uploads:
